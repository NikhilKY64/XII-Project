<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Classroom Monitoring</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #121212;
            color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            padding: 24px 0 8px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        p {
            margin: 8px 0 0;
            color: #c1c1c1;
        }
        .video-card {
            width: 100%;
            max-width: 880px;
            background: #1f1f1f;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
            margin-bottom: 18px;
        }
        img {
            display: block;
            width: 100%;
            border-radius: 12px;
        }
        .footer {
            color: #8e8e8e;
            font-size: 0.95rem;
            text-align: center;
            max-width: 760px;
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Classroom Monitoring</h1>
        <p>Live webcam feed with on-screen face detection, head direction, and suspicious behavior tracking.</p>
    </header>
    <div class="video-card">
        <img src="http://127.0.0.1:5000/video" alt="Live video stream">
    </div>
    <div class="footer">
        <p>Open <strong>http://127.0.0.1:5000/</strong> in your browser after running <code>python App.py</code>.</p>
    </div>
</body>
</html>
